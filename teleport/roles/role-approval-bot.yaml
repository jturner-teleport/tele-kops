kind: role
version: v7
metadata:
  name: role-approval-bot
spec:
  allow:
    rules:
      - resources:
          - access_request
        verbs:
          - list
          - read
          - update
      # The bot enumerates access_lists + their members to decide whether
      # a requester qualifies for auto-approval (e.g. devops-kube-access
      # grants the marker role-kube-access-auto-approved to its members).
      - resources:
          - access_list
        verbs:
          - list
          - read
  options:
    max_session_ttl: 10h0m0s
