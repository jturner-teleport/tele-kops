# approval-bot-deployment.yaml — Kubernetes Deployment for the Teleport auto-approval bot.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: approval-bot
  namespace: teleport
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: approval-bot
  namespace: teleport
  labels:
    app: approval-bot
spec:
  replicas: 1
  selector:
    matchLabels:
      app: approval-bot
  template:
    metadata:
      labels:
        app: approval-bot
    spec:
      serviceAccountName: approval-bot
      imagePullSecrets:
        - name: ghcr-pull-secret
      containers:
        - name: approval-bot
          image: ghcr.io/jturner-teleport/approval-bot:latest
          env:
            # Connect directly to auth's in-cluster gRPC service instead of
            # going out through the public proxy NLB. Skips two network hops
            # (pod → NLB → proxy → auth becomes pod → auth) and the renamed
            # var "TELEPORT_AUTH_ADDR" + the upstream var name "TELEPORT_PROXY_ADDR"
            # are both consumed by bot/main.go's client.New which auto-detects
            # whether the address is a proxy or auth endpoint.
            - name: TELEPORT_PROXY_ADDR
              value: teleport-auth.teleport.svc.cluster.local:3025
            - name: TELEPORT_IDENTITY_FILE
              value: /var/run/secrets/teleport/identity
          volumeMounts:
            - name: teleport-identity
              mountPath: /var/run/secrets/teleport
              readOnly: true
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi
      volumes:
        - name: teleport-identity
          secret:
            secretName: approval-bot-identity
