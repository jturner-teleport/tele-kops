name: Build Postgres+wal2json image

on:
  push:
    branches: [main]
    paths:
      - docker/Dockerfile
  workflow_dispatch:

jobs:
  build:
    name: Build and push to GHCR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: docker
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/postgres-wal2json:17
            ghcr.io/${{ github.repository_owner }}/postgres-wal2json:17-${{ github.sha }}
