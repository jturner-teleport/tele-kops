# role-grafana-access — grants access to apps labeled `tier: ops`.
# Currently applies to:
#   - Grafana app (helm/grafana-agent-values.yaml.tpl)
#   - Prometheus app (helm/prometheus-agent-values.yaml.tpl)
# Naturally extends to future operations-team apps via the same `tier: ops` label.
# Name is historical (this was originally Grafana-only); kept for backwards-compat.
kind: role
version: v7
metadata:
  name: role-grafana-access
spec:
  allow:
    app_labels:
      tier: ops
  options:
    max_session_ttl: 8h0m0s
