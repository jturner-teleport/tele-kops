kind: role
version: v7
metadata:
  name: role-base
spec:
  allow:
    # No standing visibility on any resource. Discovery is delegated to
    # search_as_roles: the user temporarily borrows the target role's labels
    # at search time, picks a specific resource, and submits a Resource
    # Access Request. Approval grants access to that resource only — not the
    # whole role — which is what the Teleport docs recommend over wildcard
    # *_labels on the base role.
    # Reference: https://goteleport.com/docs/identity-governance/access-requests/resource-requests/
    request:
      # Role-request flow: user can request to elevate to one of these roles
      # in full (used by the auto-approval bot for access-list-gated roles).
      roles:
        - role-kube-access
        - role-ssh-access
        - role-ssh-root-access
      # Resource-request flow: user can browse resources visible to these
      # roles and request access to specific ones. role-grafana-access is
      # included here (but not in request.roles) so non-admins can discover
      # and request Grafana per-app.
      search_as_roles:
        - role-kube-access
        - role-ssh-access
        - role-ssh-root-access
        - role-grafana-access
      thresholds:
        - approve: 1
          deny: 1
    # Observability rules (not privileges):
    rules:
      - resources: ['event', 'session']
        verbs: ['list', 'read']
      # Identity Security / Access Graph — lets the user see the
      # "Identity Security" item + Graph Explorer in the Web UI.
      - resources: ['access_graph']
        verbs: ['list', 'read']
  options:
    max_session_ttl: 8h0m0s
    request_access: optional
