kind: token
version: v2
metadata:
  name: github-ci-token
spec:
  roles:
    - Bot
  bot_name: ci-bot
  join_method: github
  github:
    allow:
      - repository: jturner-teleport/tele-kops
        # Matches the workflow's `name:` field (the GitHub OIDC `workflow` claim),
        # NOT the filename. Update if the workflow is renamed.
        workflow: Apply Teleport Config
