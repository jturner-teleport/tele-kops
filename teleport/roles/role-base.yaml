kind: role
version: v7
metadata:
  name: role-base
spec:
  allow:
    # No standing privileges. Users with role-base have NO logins, NO kube
    # access, NO app access — they can only request the three other roles.
    # See teleport/roles/role-{kube,ssh,ssh-root}-access.yaml.
    request:
      roles:
        - role-kube-access
        - role-ssh-access
        - role-ssh-root-access
      thresholds:
        - approve: 1
          deny: 1
    # Observability rules (not privileges):
    rules:
      - resources: ['event', 'session']
        verbs: ['list', 'read']
      # Identity Security / Access Graph — lets the user see the
      # "Identity Security" item + Graph Explorer in the Web UI.
      - resources: ['access_graph']
        verbs: ['list', 'read']
  options:
    max_session_ttl: 8h0m0s
    request_access: optional
