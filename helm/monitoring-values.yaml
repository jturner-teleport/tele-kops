# monitoring-values.yaml — kube-prometheus-stack values for the Teleport dev cluster.
prometheus:
  prometheusSpec:
    # Scrape ServiceMonitors AND PodMonitors from all namespaces. ServiceMonitor
    # selectors cover the teleport-cluster auth/proxy. PodMonitor selectors cover
    # the teleport-kube-agent deployments (grafana-agent, prometheus-agent, etc.).
    serviceMonitorSelectorNilUsesHelmValues: false
    serviceMonitorSelector: {}
    serviceMonitorNamespaceSelector: {}
    podMonitorSelectorNilUsesHelmValues: false
    podMonitorSelector: {}
    podMonitorNamespaceSelector: {}
    # Public URL for Prometheus when accessed behind Teleport's app proxy.
    # Without this, Prometheus links/redirects break.
    externalUrl: "https://prometheus.teleport.jwturner.dev"
    retention: 7d
    storageSpec:
      volumeClaimTemplate:
        spec:
          resources:
            requests:
              storage: 10Gi

grafana:
  adminPassword: "changeme"
  # Grafana is exposed via Teleport's app_service at https://grafana.teleport.jwturner.dev
  # (separate teleport-kube-agent deployment registers Grafana as an application).
  #
  # auth.jwt: Grafana verifies a Teleport-signed JWT via the proxy's JWKS endpoint.
  # The teleport-kube-agent app rewrite (helm/grafana-agent-values.yaml.tpl) injects
  # `Authorization: Bearer {{internal.jwt}}` on every request. role_attribute_path
  # maps Teleport roles → Grafana org roles at login time.
  # Reference: https://goteleport.com/docs/enroll-resources/application-access/jwt/grafana/

  # Read-only Postgres datasource for the Identity Security dashboard.
  # access_graph user only has SELECT on the tenant schema (CNPG-managed role).
  envValueFrom:
    AG_PG_PASSWORD:
      secretKeyRef:
        name: access-graph-pg-creds
        key: password
  additionalDataSources:
    - name: Access Graph
      type: postgres
      url: teleport-postgres-rw.teleport.svc.cluster.local:5432
      user: access_graph
      access: proxy
      jsonData:
        database: access_graph
        sslmode: require
        postgresVersion: 1700
      secureJsonData:
        password: $AG_PG_PASSWORD

  grafana.ini:
    server:
      root_url: "https://grafana.teleport.jwturner.dev/"
      serve_from_sub_path: false
    auth:
      disable_login_form: true            # hide local login (Teleport handles auth)
      disable_signout_menu: false
    auth.jwt:
      enabled: true
      header_name: Authorization
      # Teleport's proxy serves a public JWKS at /.well-known/jwks.json. Grafana
      # uses it to verify the JWT signed by the app_service rewrite header.
      jwk_set_url: https://teleport.jwturner.dev/.well-known/jwks.json
      # sub = Teleport login name (e.g. SSO email or local 'admin')
      username_claim: sub
      auto_sign_up: true
      # Map Teleport roles → Grafana org role on every login. The built-in
      # 'access' role (granted to admins) becomes Grafana Admin; everyone else
      # who can reach the app (gated by role-grafana-access at the Teleport
      # layer) falls through to Viewer.
      role_attribute_path: contains(roles[*], 'access') && 'Admin' || 'Viewer'
    auth.anonymous:
      enabled: false
  sidecar:
    dashboards:
      enabled: true
      searchNamespace: ALL

alertmanager:
  alertmanagerSpec:
    storage:
      volumeClaimTemplate:
        spec:
          resources:
            requests:
              storage: 2Gi
