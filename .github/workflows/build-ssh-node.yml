name: Build ssh-node image

on:
  push:
    branches: [main]
    paths:
      - ssh-node/**
  workflow_dispatch:

jobs:
  build:
    name: Build and push to GHCR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ssh-node
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/ssh-node:latest
            ghcr.io/${{ github.repository_owner }}/ssh-node:${{ github.sha }}
